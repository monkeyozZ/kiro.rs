version: '3.8'

services:
  kiro-rs:
    image: kiro-rs:latest  # 替换为你的镜像地址
    container_name: kiro-rs
    restart: unless-stopped
    ports:
      - "8990:8990"
    volumes:
      # 配置文件目录
      - ./config:/app/config
      # 可选：持久化余额缓存
      - ./data:/app/data
    environment:
      # 可选：设置日志级别
      - RUST_LOG=info
      # 可选：设置时区
      - TZ=Asia/Shanghai
    # 可选：资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8990/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
