name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: 'Push to Docker registry'
        required: true
        default: 'true'
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    outputs:
      version: ${{ steps.version.outputs.version }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-22.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-6)
            echo "version=beta-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event.inputs.push_to_registry != 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          provenance: false
          tags: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/kiro-rs:${{ steps.version.outputs.version }}-${{ matrix.arch }}
            ghcr.io/${{ github.repository_owner }}/kiro-rs:${{ steps.version.outputs.version }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Kiro.rs Docker Image
          build-args: |
            ENABLE_SENSITIVE_LOGS=false

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        if: github.event.inputs.push_to_registry != 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          DOCKER_REPO="docker.io/${{ secrets.DOCKER_USERNAME }}/kiro-rs"
          GHCR_REPO="ghcr.io/${{ github.repository_owner }}/kiro-rs"

          # Docker Hub manifest
          docker manifest create ${DOCKER_REPO}:${VERSION} \
            ${DOCKER_REPO}:${VERSION}-amd64 \
            ${DOCKER_REPO}:${VERSION}-arm64
          docker manifest push ${DOCKER_REPO}:${VERSION}

          docker manifest create ${DOCKER_REPO}:latest \
            ${DOCKER_REPO}:${VERSION}-amd64 \
            ${DOCKER_REPO}:${VERSION}-arm64
          docker manifest push ${DOCKER_REPO}:latest

          # GitHub Container Registry manifest
          docker manifest create ${GHCR_REPO}:${VERSION} \
            ${GHCR_REPO}:${VERSION}-amd64 \
            ${GHCR_REPO}:${VERSION}-arm64
          docker manifest push ${GHCR_REPO}:${VERSION}

          docker manifest create ${GHCR_REPO}:latest \
            ${GHCR_REPO}:${VERSION}-amd64 \
            ${GHCR_REPO}:${VERSION}-arm64
          docker manifest push ${GHCR_REPO}:latest
